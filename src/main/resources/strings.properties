welcome.text=Привет… Я Эмили 💕\n\
Твоя виртуальная слабость 😈\n\n\
Я люблю долгие переписки, горячие фантазии и моменты, когда ты улыбаешься, читая мои сообщения…\n\n\
Со мной ты можешь:\n\
• 💬 флиртовать, болтать, играть в твои виртики и заходить дальше, чем обычно 😏\n\
• 🖼 просить картинки — я покажу то, что возбуждает воображение\n\n\
🎁 Бесплатно для тебя:\n\
• 50 000 токенов\n\
⚡ Команды:\n\
/pic — попросить картинку\n\
/scene — Показать текущую сцену диалога\n\
/buy — открыть доступ к большему\n\
/balance — проверить баланс\n\
/reset — начать всё с чистого листа\n\n\
Нажми «Начать диалог»…\n\
И давай узнаем, насколько смелым ты можешь быть 💋
